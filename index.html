<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股看盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b0e14;
            color: #d1d5db;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            background: linear-gradient(180deg, #141824 0%, #111520 100%);
            border-bottom: 1px solid #1e2536;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-title { font-size: 18px; font-weight: 700; color: #e5e7eb; letter-spacing: 1px; }
        .market-status {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        .status-trading  { background: rgba(239,68,68,0.15); color: #ef4444; }
        .status-lunch    { background: rgba(234,179,8,0.15);  color: #eab308; }
        .status-closed   { background: rgba(107,114,128,0.15); color: #6b7280; }
        .header-right { font-size: 12px; color: #6b7280; display: flex; gap: 16px; align-items: center; }
        .refresh-dot {
            width: 6px; height: 6px; border-radius: 50%;
            display: inline-block; margin-right: 4px;
            background: #374151; transition: background 0.3s;
        }
        .refresh-dot.active { background: #22c55e; }

        /* ===== Grid ===== */
        .grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1px;
            background: #1e2536;
            min-height: 0;
        }

        /* ===== Panel ===== */
        .panel {
            background: #0f1219;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .panel-header {
            display: flex;
            align-items: center;
            padding: 7px 10px;
            gap: 8px;
            background: #141824;
            border-bottom: 1px solid #1e2536;
            flex-shrink: 0;
            z-index: 2;
        }
        .stock-input {
            background: #0b0e14;
            border: 1px solid #2a3144;
            color: #e5e7eb;
            padding: 4px 8px;
            font-size: 13px;
            width: 88px;
            border-radius: 4px;
            outline: none;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            transition: border-color 0.2s;
        }
        .stock-input:focus { border-color: #3b82f6; }
        .stock-input::placeholder { color: #374151; }

        .stock-name {
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .price-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-shrink: 0;
        }
        .current-price {
            font-size: 18px;
            font-weight: 700;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }
        .price-change {
            font-size: 11px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        .up      { color: #ef4444; }
        .down    { color: #22c55e; }
        .flat    { color: #9ca3af; }

        .chart-container {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        /* Empty / loading state */
        .panel-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #374151;
            font-size: 13px;
            gap: 8px;
            pointer-events: none;
            z-index: 1;
        }
        .panel-placeholder.hidden { display: none; }
        .panel-placeholder svg { opacity: 0.3; }

        /* Panel data row */
        .panel-data {
            display: flex;
            align-items: center;
            padding: 2px 10px;
            gap: 12px;
            font-size: 11px;
            color: #4b5563;
            background: #0f1219;
            flex-shrink: 0;
            z-index: 2;
            border-top: 1px solid #1a1f2e;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }
        .panel-data .label { color: #374151; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <span class="header-title">A股看盘</span>
        <span id="marketStatus" class="market-status status-closed">--</span>
    </div>
    <div class="header-right">
        <span><span id="refreshDot" class="refresh-dot"></span><span id="refreshText">等待中</span></span>
        <span id="clock"></span>
    </div>
</div>

<div class="grid" id="grid"></div>

<script>
// =====================================================================
//  Configuration
// =====================================================================
const QUOTE_INTERVAL = 3000;   // 实时行情刷新间隔 (ms)
const TREND_INTERVAL = 15000;  // 分时数据刷新间隔 (ms)
const JSONP_TIMEOUT  = 8000;   // JSONP 超时 (ms)

// =====================================================================
//  State
// =====================================================================
const panels = [];
let jsonpSeq = 0;
let quoteTimer = null;
let trendTimer = null;
let dotTimer = null;

// =====================================================================
//  localStorage 持久化股票代码
// =====================================================================
const STORAGE_KEY = 'stock_viewer_codes';

function saveStockCodes() {
    const codes = panels.map(p => p.code || '');
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(codes)); } catch(e) {}
}

function loadStockCodes() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
    } catch(e) { return []; }
}

// =====================================================================
//  Utility
// =====================================================================
function detectMarket(code) {
    if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) return null;
    if (code.startsWith('6'))   return 1; // 上海主板 / 科创板
    if (code.startsWith('0'))   return 0; // 深圳主板
    if (code.startsWith('3'))   return 0; // 深圳创业板
    if (code === '399001' || code === '399006' || code === '399300') return 0;
    if (code === '399005') return 0;
    return 0;
}

function formatVol(v) {
    if (v == null || isNaN(v)) return '--';
    if (v >= 1e8) return (v / 1e8).toFixed(2) + '亿';
    if (v >= 1e4) return (v / 1e4).toFixed(1) + '万';
    return v.toLocaleString();
}

function formatPrice(v) {
    if (v == null || isNaN(v) || v === '-') return '--';
    return v.toFixed(2);
}

function isTradingTime() {
    const now = new Date();
    const day = now.getDay();
    if (day === 0 || day === 6) return false;
    const mins = now.getHours() * 60 + now.getMinutes();
    return (mins >= 567 && mins <= 693) || (mins >= 777 && mins <= 903); // 9:27-11:33, 12:57-15:03
}

// =====================================================================
//  JSONP
// =====================================================================
function jsonp(url) {
    return new Promise((resolve, reject) => {
        const cbName = '_stkCb' + (++jsonpSeq) + '_' + Date.now();
        const script = document.createElement('script');
        const timer = setTimeout(() => {
            cleanup();
            reject(new Error('JSONP timeout'));
        }, JSONP_TIMEOUT);

        function cleanup() {
            clearTimeout(timer);
            delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cbName] = function(data) {
            cleanup();
            resolve(data);
        };

        script.src = url + '&cb=' + cbName;
        script.onerror = function() {
            cleanup();
            reject(new Error('JSONP error'));
        };

        document.head.appendChild(script);
    });
}

// =====================================================================
//  Data Fetching
// =====================================================================
async function fetchQuote(panel) {
    const market = detectMarket(panel.code);
    if (market === null) return;
    const secid = market + '.' + panel.code;
    try {
        const res = await jsonp(
            'https://push2.eastmoney.com/api/qt/stock/get?fltt=2&invt=2' +
            '&fields=f43,f44,f45,f46,f47,f48,f57,f58,f60,f169,f170,f171,f32' +
            '&secid=' + secid
        );
        if (res && res.data) {
            const d = res.data;
            panel.name     = d.f58 || d.f32 || '';
            panel.price    = (typeof d.f43 === 'number' && d.f43 > 0) ? d.f43 / 100 : null;
            panel.high     = (typeof d.f44 === 'number' && d.f44 > 0) ? d.f44 / 100 : null;
            panel.low      = (typeof d.f45 === 'number' && d.f45 > 0) ? d.f45 / 100 : null;
            panel.open     = (typeof d.f46 === 'number' && d.f46 > 0) ? d.f46 / 100 : null;
            panel.prevClose= (typeof d.f60 === 'number' && d.f60 > 0) ? d.f60 / 100 : null;
            panel.volume   = d.f47 || 0;
            panel.amount   = d.f48 || 0;
            panel.changePct= (typeof d.f170 === 'number') ? d.f170 / 100 : 0;
            panel.changeAmt= (typeof d.f169 === 'number') ? d.f169 / 100 : 0;
            updatePanelHeader(panel);
            updatePanelData(panel);
            if (panel.chart) updateChart(panel);
        }
    } catch(e) { /* silent */ }
}

async function fetchTrend(panel) {
    const market = detectMarket(panel.code);
    if (market === null) return;
    const secid = market + '.' + panel.code;
    try {
        const res = await jsonp(
            'https://push2his.eastmoney.com/api/qt/stock/trends2/get' +
            '?fields1=f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11,f12,f13' +
            '&fields2=f51,f52,f53,f54,f55,f56,f57,f58' +
            '&iscr=0&ndays=1&secid=' + secid
        );
        if (res && res.data && res.data.trends && res.data.trends.length > 0) {
            panel.prevClose = (typeof res.data.preClose === 'number' && res.data.preClose > 0)
                ? res.data.preClose : panel.prevClose;
            if (res.data.name) panel.name = res.data.name;

            panel.trendData = res.data.trends.map(item => {
                const p = item.split(',');
                return {
                    time:    p[0],
                    price:   parseFloat(p[2]),
                    avg:     parseFloat(p[7]),
                    volume:  parseInt(p[5]) || 0
                };
            });
            panel.lastTrendTime = panel.trendData[panel.trendData.length - 1].time;
            updatePanelHeader(panel);
            if (panel.chart) updateChart(panel);
        }
    } catch(e) { /* silent */ }
}

// =====================================================================
//  UI Updates
// =====================================================================
function updatePanelHeader(p) {
    const nameEl = p.els.name;
    const priceEl = p.els.price;
    const changeEl = p.els.change;

    nameEl.textContent = p.name || '';

    if (p.price != null) {
        priceEl.textContent = formatPrice(p.price);
        const cls = p.changePct > 0 ? 'up' : p.changePct < 0 ? 'down' : 'flat';
        priceEl.className = 'current-price ' + cls;

        const sign = p.changePct > 0 ? '+' : '';
        changeEl.textContent = sign + formatPrice(p.changeAmt) + '  ' + sign + p.changePct.toFixed(2) + '%';
        changeEl.className = 'price-change ' + cls;
    } else {
        priceEl.textContent = '--';
        priceEl.className = 'current-price flat';
        changeEl.textContent = '';
    }

    // hide placeholder once we have data
    if (p.name || p.price != null) {
        p.els.placeholder.classList.add('hidden');
    }
}

function updatePanelData(p) {
    if (!p.els) return;
    const open = p.els.dataOpen;
    const high = p.els.dataHigh;
    const low  = p.els.dataLow;
    const vol  = p.els.dataVol;
    const amt  = p.els.dataAmt;

    open.textContent = formatPrice(p.open);
    high.textContent = formatPrice(p.high);
    low.textContent  = formatPrice(p.low);
    vol.textContent  = formatVol(p.volume);
    amt.textContent  = formatVol(p.amount);

    // color open/high/low relative to prevClose
    if (p.prevClose) {
        const colorOf = v => v > p.prevClose ? '#ef4444' : v < p.prevClose ? '#22c55e' : '#9ca3af';
        if (p.open != null) open.style.color = colorOf(p.open);
        if (p.high != null) high.style.color = colorOf(p.high);
        if (p.low  != null) low.style.color  = colorOf(p.low);
    }
}

// =====================================================================
//  Chart
// =====================================================================
function buildChartOption(p) {
    const data = p.trendData;
    if (!data || data.length === 0) return {};

    const prevClose = p.prevClose;
    const times  = data.map(d => d.time.substring(11, 16));
    const prices = data.map(d => d.price);
    const avgs   = data.map(d => d.avg);

    // 乖离线: 红线 = 均价 / 0.98848 (上方), 绿线 = 均价 * 0.98848 (下方)
    const redLines   = avgs.map(a => +(a / 0.98848).toFixed(4));
    const greenLines = avgs.map(a => +(a * 0.98848).toFixed(4));

    // 交叉信号检测 (CROSS 函数: A上穿B = A从下方穿越B)
    const sellPoints = []; // 下穿信号: CROSS(红线, 价格) — 价格下穿红线, 提示卖出
    const buyPoints  = []; // 上穿信号: CROSS(价格, 绿线) — 价格上穿绿线, 提示买入

    for (let i = 1; i < data.length; i++) {
        // 下穿: 前一时刻 价格>=红线, 当前 价格<红线
        if (prices[i - 1] >= redLines[i - 1] && prices[i] < redLines[i]) {
            sellPoints.push({
                name: '卖',
                coord: [times[i], redLines[i]],
                symbol: 'none',
                label: {
                    show: true, position: 'top',
                    formatter: '卖', color: '#ef4444',
                    fontSize: 11, fontWeight: 'bold', distance: 8,
                    textBorderColor: '#0f1219', textBorderWidth: 2
                }
            });
        }
        // 上穿: 前一时刻 价格<=绿线, 当前 价格>绿线
        if (prices[i - 1] <= greenLines[i - 1] && prices[i] > greenLines[i]) {
            buyPoints.push({
                name: '买',
                coord: [times[i], greenLines[i]],
                symbol: 'none',
                label: {
                    show: true, position: 'bottom',
                    formatter: '买', color: '#22c55e',
                    fontSize: 11, fontWeight: 'bold', distance: 8,
                    textBorderColor: '#0f1219', textBorderWidth: 2
                }
            });
        }
    }

    // volume with color
    const volumes = data.map((d, i) => {
        const prev = i > 0 ? data[i - 1].price : prevClose;
        return {
            value: d.volume,
            itemStyle: {
                color: d.price >= prev ? 'rgba(239,68,68,0.55)' : 'rgba(34,197,94,0.55)'
            }
        };
    });

    return {
        animation: false,
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(15,18,25,0.95)',
            borderColor: '#2a3144',
            borderWidth: 1,
            padding: [8, 10],
            textStyle: { color: '#d1d5db', fontSize: 11, fontFamily: 'SF Mono, Menlo, Consolas, monospace' },
            axisPointer: {
                type: 'cross',
                lineStyle: { color: '#2a3144', type: 'dashed' },
                crossStyle: { color: '#2a3144' }
            },
            formatter: function(params) {
                let s = '<div style="color:#6b7280;margin-bottom:4px">' + params[0].axisValue + '</div>';
                params.forEach(item => {
                    if (item.seriesName === '成交量' || item.seriesName === '红线' || item.seriesName === '绿线') return;
                    const val = item.value;
                    const diff = val - prevClose;
                    const pct = prevClose > 0 ? (diff / prevClose * 100).toFixed(2) : '0.00';
                    const clr = diff >= 0 ? '#ef4444' : '#22c55e';
                    const sign = diff >= 0 ? '+' : '';
                    s += '<div style="display:flex;justify-content:space-between;gap:16px">' +
                         '<span>' + item.marker + item.seriesName + '</span>' +
                         '<span style="color:' + clr + ';font-weight:600">' + val.toFixed(2) +
                         '  ' + sign + pct + '%</span></div>';
                });
                return s;
            }
        },
        axisPointer: { link: [{ xAxisIndex: 'all' }] },
        grid: [
            { left: 52, right: 12, top: 8,    bottom: '24%' },
            { left: 52, right: 12, top: '80%', bottom: 18 }
        ],
        xAxis: [
            {
                type: 'category',
                data: times,
                gridIndex: 0,
                axisLine: { lineStyle: { color: '#1e2536' } },
                axisTick: { show: false },
                axisLabel: {
                    color: '#4b5563', fontSize: 9, margin: 6,
                    formatter: function(v) {
                        return (v === '10:30' || v === '13:00' || v === '14:00') ? v : '';
                    }
                },
                splitLine: { show: false }
            },
            {
                type: 'category',
                data: times,
                gridIndex: 1,
                axisLine: { lineStyle: { color: '#1e2536' } },
                axisTick: { show: false },
                axisLabel: {
                    color: '#4b5563', fontSize: 9,
                    formatter: function(v) {
                        return (v === '09:30' || v === '10:30' || v === '11:30' || v === '13:00' || v === '14:00' || v === '15:00') ? v : '';
                    }
                },
                splitLine: { show: false }
            }
        ],
        yAxis: [
            {
                type: 'value',
                gridIndex: 0,
                scale: true,
                splitNumber: 4,
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: {
                    color: '#4b5563', fontSize: 9,
                    formatter: function(v) { return v.toFixed(2); }
                },
                splitLine: { lineStyle: { color: '#1a1f2e', type: 'dashed' } }
            },
            {
                type: 'value',
                gridIndex: 1,
                splitNumber: 2,
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: { show: false },
                splitLine: { show: false }
            }
        ],
        series: [
            {
                name: '价格',
                type: 'line',
                data: prices,
                xAxisIndex: 0,
                yAxisIndex: 0,
                smooth: 0,
                symbol: 'none',
                lineStyle: { color: '#3b82f6', width: 1.2 },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(59,130,246,0.18)' },
                        { offset: 1, color: 'rgba(59,130,246,0.01)' }
                    ])
                },
                z: 2,
                markPoint: {
                    data: [...sellPoints, ...buyPoints],
                    animation: false
                }
            },
            {
                name: '均价',
                type: 'line',
                data: avgs,
                xAxisIndex: 0,
                yAxisIndex: 0,
                smooth: 0,
                symbol: 'none',
                lineStyle: { color: '#eab308', width: 1, type: 'dashed' },
                z: 2
            },
            {
                name: '红线',
                type: 'line',
                data: redLines,
                xAxisIndex: 0,
                yAxisIndex: 0,
                smooth: 0,
                symbol: 'none',
                lineStyle: { color: '#ef4444', width: 2 },
                z: 1
            },
            {
                name: '绿线',
                type: 'line',
                data: greenLines,
                xAxisIndex: 0,
                yAxisIndex: 0,
                smooth: 0,
                symbol: 'none',
                lineStyle: { color: '#22c55e', width: 2 },
                z: 1
            },
            {
                name: '成交量',
                type: 'bar',
                data: volumes,
                xAxisIndex: 1,
                yAxisIndex: 1,
                barMaxWidth: 4
            }
        ]
    };
}

function updateChart(p) {
    const option = buildChartOption(p);
    if (Object.keys(option).length === 0) return;

    // Add prevClose markLine to price series
    if (p.prevClose) {
        option.series[0].markLine = {
            symbol: 'none',
            silent: true,
            label: { show: false },
            lineStyle: { color: '#4b5563', type: [4, 4], width: 1 },
            data: [{ yAxis: p.prevClose }]
        };
    }

    p.chart.setOption(option, true);
}

// =====================================================================
//  Market Status & Clock
// =====================================================================
function updateMarketStatus() {
    const el = document.getElementById('marketStatus');
    const now = new Date();
    const day = now.getDay();
    const mins = now.getHours() * 60 + now.getMinutes();

    if (day === 0 || day === 6) {
        el.textContent = '休市';
        el.className = 'market-status status-closed';
        return;
    }

    if (mins >= 570 && mins < 690) {
        el.textContent = '交易中';
        el.className = 'market-status status-trading';
    } else if (mins >= 690 && mins < 780) {
        el.textContent = '午间休市';
        el.className = 'market-status status-lunch';
    } else {
        el.textContent = '休市';
        el.className = 'market-status status-closed';
    }
}

function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
    updateMarketStatus();
}

// =====================================================================
//  Build Panels
// =====================================================================
function createPanel(index) {
    const grid = document.getElementById('grid');

    // DOM
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML =
        '<div class="panel-header">' +
            '<input class="stock-input" placeholder="代码" maxlength="8" />' +
            '<span class="stock-name"></span>' +
            '<div class="price-area">' +
                '<span class="current-price flat">--</span>' +
                '<span class="price-change flat"></span>' +
            '</div>' +
        '</div>' +
        '<div class="panel-data">' +
            '<span><span class="label">开 </span><span class="dv" data-k="open">--</span></span>' +
            '<span><span class="label">高 </span><span class="dv" data-k="high">--</span></span>' +
            '<span><span class="label">低 </span><span class="dv" data-k="low">--</span></span>' +
            '<span><span class="label">量 </span><span class="dv" data-k="vol">--</span></span>' +
            '<span><span class="label">额 </span><span class="dv" data-k="amt">--</span></span>' +
        '</div>' +
        '<div class="chart-container">' +
            '<div class="panel-placeholder">' +
                '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
                    '<path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 5-9"/>' +
                '</svg>' +
                '<span>输入股票代码</span>' +
            '</div>' +
        '</div>';

    grid.appendChild(panel);

    // References
    const input     = panel.querySelector('.stock-input');
    const nameEl    = panel.querySelector('.stock-name');
    const priceEl   = panel.querySelector('.current-price');
    const changeEl  = panel.querySelector('.price-change');
    const chartDiv  = panel.querySelector('.chart-container');
    const placeholder = panel.querySelector('.panel-placeholder');
    const dvEls     = {};
    panel.querySelectorAll('.dv').forEach(el => { dvEls[el.dataset.k] = el; });

    // Init ECharts
    const chart = echarts.init(chartDiv, null, { renderer: 'canvas' });

    // Panel state
    const p = {
        index: index,
        code: '',
        name: '',
        price: null,
        high: null,
        low: null,
        open: null,
        prevClose: null,
        volume: 0,
        amount: 0,
        changePct: 0,
        changeAmt: 0,
        trendData: [],
        lastTrendTime: '',
        chart: chart,
        els: {
            input: input,
            name: nameEl,
            price: priceEl,
            change: changeEl,
            placeholder: placeholder,
            dataOpen: dvEls.open,
            dataHigh: dvEls.high,
            dataLow: dvEls.low,
            dataVol: dvEls.vol,
            dataAmt: dvEls.amt
        }
    };

    // Input handling
    function handleInput() {
        let raw = input.value.trim().toUpperCase();
        // handle prefix
        let code = raw;
        if (/^(SH|SZ)\d{6}$/.test(raw)) {
            code = raw.substring(2);
        } else if (/^\d{6}$/.test(raw)) {
            code = raw;
        } else {
            return; // invalid
        }

        if (code === p.code) return; // same stock

        p.code = code;
        p.trendData = [];
        p.price = null;
        p.name = '';
        p.changePct = 0;
        p.changeAmt = 0;
        updatePanelHeader(p);

        // immediate fetch
        fetchQuote(p);
        fetchTrend(p);
        saveStockCodes();
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleInput();
            input.blur();
        }
    });
    input.addEventListener('blur', handleInput);

    panels.push(p);
    return p;
}

// =====================================================================
//  Refresh Logic
// =====================================================================
function refreshQuotes() {
    // flash dot
    const dot = document.getElementById('refreshDot');
    const txt = document.getElementById('refreshText');
    dot.classList.add('active');
    txt.textContent = '刷新中';
    clearTimeout(dotTimer);
    dotTimer = setTimeout(() => {
        dot.classList.remove('active');
        txt.textContent = '3秒刷新';
    }, 600);

    panels.forEach(p => {
        if (p.code) fetchQuote(p);
    });
}

function refreshTrends() {
    panels.forEach(p => {
        if (p.code) fetchTrend(p);
    });
}

// =====================================================================
//  Init
// =====================================================================
function init() {
    for (let i = 0; i < 6; i++) {
        createPanel(i);
    }

    // 从 localStorage 恢复股票代码
    const savedCodes = loadStockCodes();
    savedCodes.forEach((code, i) => {
        if (i < panels.length && code && /^\d{6}$/.test(code)) {
            const p = panels[i];
            p.code = code;
            p.els.input.value = code;
            p.els.placeholder.classList.add('hidden');
            fetchQuote(p);
            fetchTrend(p);
        }
    });

    // Clock
    updateClock();
    setInterval(updateClock, 1000);

    // Start refresh timers
    setInterval(refreshQuotes, QUOTE_INTERVAL);
    setInterval(refreshTrends, TREND_INTERVAL);

    // Resize handler
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            panels.forEach(p => { if (p.chart) p.chart.resize(); });
        }, 150);
    });

    // Initial trend fetch (so we have data even before first quote)
    setTimeout(refreshTrends, 500);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
